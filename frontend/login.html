<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend/">
    <title>Entrar | Portal Vida Livre</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body data-page="login">
    <header class="site-header">
        <div class="container header-row">
            <a class="brand" href="./index.html">Portal Vida Livre</a>
            <nav class="nav">
                <a href="./login.html" aria-current="page">Entrar</a>
                <a href="./cadastro.html">Cadastro</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="panel">
            <h1>Entrar</h1>
            <p class="page-text">Acesse sua conta.</p>
            <div class="message hidden" data-message></div>

            <form id="login-form" class="form" novalidate>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input id="email" name="email" type="email" autocomplete="email">
                    <small class="field-error" data-error-for="email"></small>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input id="password" name="password" type="password" autocomplete="current-password">
                    <small class="field-error" data-error-for="password"></small>
                </div>

                <button type="submit">Entrar</button>
            </form>

            <p class="page-text">
                <a href="./esqueceu-senha.html">Esqueci minha senha</a>
            </p>
        </section>
    </main>

    <script src="./assets/js/api.js" defer></script>
    <script src="./assets/js/auth.js" defer></script>
    <script src="./assets/js/login.js" defer></script>
</body>
</html>
