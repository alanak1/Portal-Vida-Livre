<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend/">
    <title>Recuperar senha | Portal Vida Livre</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body data-page="esqueceu-senha">
    <header class="site-header">
        <div class="container header-row">
            <a class="brand" href="./index.html">Portal Vida Livre</a>
            <nav class="nav">
                <a href="./login.html">Entrar</a>
                <a href="./cadastro.html">Cadastro</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="panel">
            <h1>Esqueci minha senha</h1>
            <p class="page-text">Informe seu e-mail para receber o link de redefinicao.</p>
            <div class="message hidden" data-message></div>

            <form id="forgot-password-form" class="form" novalidate>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input id="email" name="email" type="email" autocomplete="email">
                    <small class="field-error" data-error-for="email"></small>
                </div>

                <button type="submit">Enviar link</button>
            </form>
        </section>
    </main>

    <script src="./assets/js/api.js" defer></script>
    <script src="./assets/js/auth.js" defer></script>
    <script src="./assets/js/forgot-password.js" defer></script>
</body>
</html>
