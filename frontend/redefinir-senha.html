<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend/">
    <title>Redefinir senha | Portal Vida Livre</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body data-page="redefinir-senha">
    <header class="site-header">
        <div class="container header-row">
            <a class="brand" href="./index.html">Portal Vida Livre</a>
            <nav class="nav">
                <a href="./login.html">Entrar</a>
                <a href="./cadastro.html">Cadastro</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="panel">
            <h1>Redefinir senha</h1>
            <p class="page-text">Defina uma nova senha para sua conta.</p>
            <div class="message hidden" data-message></div>

            <form id="reset-password-form" class="form" novalidate>
                <div class="form-group">
                    <label for="password">Nova senha</label>
                    <input id="password" name="password" type="password" autocomplete="new-password">
                    <small class="field-error" data-error-for="password"></small>
                </div>

                <div class="form-group">
                    <label for="password_confirmation">Confirmar nova senha</label>
                    <input id="password_confirmation" name="password_confirmation" type="password" autocomplete="new-password">
                    <small class="field-error" data-error-for="password_confirmation"></small>
                </div>

                <button type="submit">Salvar nova senha</button>
            </form>

            <p class="page-text hidden" data-new-link>
                <a href="./esqueceu-senha.html">Solicitar novo link</a>
            </p>
        </section>
    </main>

    <script src="./assets/js/api.js" defer></script>
    <script src="./assets/js/auth.js" defer></script>
    <script src="./assets/js/reset-password.js" defer></script>
</body>
</html>
